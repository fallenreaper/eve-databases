name: Docker Image CI MSSQL

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [master]
env:
  DOCKER_IMAGE: fallenreaper/eve-mssql
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for changes
        id: check_changes
        run: |
          REMOTE_URL="https://www.fuzzwork.co.uk/dump/mssql-latest.bacpac"
          REMOTE_SIZE=$(curl -sI "$REMOTE_URL" | grep -i content-length | awk '{print $2}' | tr -d '\r')

          # Get the last known size from a file in the repo
          if [ -f .mssql-size ]; then
            LAST_SIZE=$(cat .mssql-size)
          else
            LAST_SIZE="0"
          fi

          echo "Remote size: $REMOTE_SIZE, Last known size: $LAST_SIZE"

          if [ "$REMOTE_SIZE" != "$LAST_SIZE" ]; then
            echo "Changes detected! Remote file size differs."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$REMOTE_SIZE" > .mssql-size
          else
            echo "No changes detected. Skipping build."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare Variables
        id: prepare
        if: steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push'
        run: |
          VERSION=$(date -u +'%Y%m%d')

          if [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION=nightly
          fi
          TAGS="${{env.DOCKER_IMAGE}}:${VERSION}"
          TAGS="$TAGS,${{env.DOCKER_IMAGE}}:latest"
          echo "TAGS=$TAGS" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        if: steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        if: steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push'
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        if: (steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push') && success() && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Build and Push
        if: (steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push') && success() && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{steps.prepare.outputs.TAGS}}
          context: mssql/.
      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .mssql-size
          git commit -m "Update mssql database size check" || true
          git push || true
