name: Docker Image CI MYSQL

on:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [master]
env:
  DOCKER_IMAGE: fallenreaper/eve-mysql
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for changes
        id: check_changes
        run: |
          REMOTE_URL="https://www.fuzzwork.co.uk/dump/mysql-latest.tar.bz2"
          REMOTE_SIZE=$(curl -sI "$REMOTE_URL" | grep -i content-length | awk '{print $2}' | tr -d '\r')

          # Get the last known size from a file in the repo
          if [ -f .mysql-size ]; then
            LAST_SIZE=$(cat .mysql-size)
          else
            LAST_SIZE="0"
          fi

          echo "Remote size: $REMOTE_SIZE, Last known size: $LAST_SIZE"

          if [ "$REMOTE_SIZE" != "$LAST_SIZE" ]; then
            echo "Changes detected! Remote file size differs."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$REMOTE_SIZE" > .mysql-size
          else
            echo "No changes detected. Skipping build."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare Variables
        id: prepare
        if: steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push'
        run: |
          VERSION=$(date -u +'%Y%m%d') 

          if [ "${{ github.event_name }}" = "schedule" ]; then
            VERSION=nightly
          fi
          TAGS="${{env.DOCKER_IMAGE}}:${VERSION}"
          TAGS="$TAGS,${{env.DOCKER_IMAGE}}:latest"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAGS=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        if: (steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push') && success() && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Build & Push
        if: (steps.check_changes.outputs.has_changes == 'true' || github.event_name == 'push') && success() && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{steps.prepare.outputs.TAGS}}
          context: mysql/.
      - name: Commit changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git fetch origin "$BRANCH"
          git pull --rebase origin "$BRANCH" || true
          git add .mysql-size
          if ! git diff --cached --quiet; then
            git commit -m "Update mysql database size check"
            git push origin "$BRANCH"
          else
            echo "No new changes to commit after syncing with remote."
          fi
